<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Planner - Add Budget</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboardStyle.css') }}" type="text/css" />
</head>
<body>
    <div class="layout-wrapper">
        <header class="top-header">
            <div class="header-left">
                <h1 class="main-title">BUDGET PLANNER</h1>
                <h2 class="sub-title">CURRICULUM VITAE STYLE ADMINISTRATION</h2>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span class="user-name">{{ current_user.username | default('J.SMITH', true) | upper }}</span>
                    <span class="user-role">{{ current_user.role | default('ADMIN', true) | upper }}</span>
                </div>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar">
                <div class="nav-section">
                    <h3 class="section-heading">NAVIGATION</h3>
                    <hr class="thick-line">
                    <ul class="nav-links">
                        <li><a href="/dashboard">⌂ DASHBOARD</a></li>
                        <li><a href="/add_transaction">⊕ ADD TRANSACTION</a></li>
                        <li><a href="/add_budget" style="text-decoration: underline;">◫ ADD BUDGET</a></li>
                        <li><a href="/admin">👤 HOUSEHOLD ADMIN</a></li>
                    </ul>
                </div>
                <div class="nav-footer">
                    <a href="/logout" class="sign-out">↪ SIGN OUT</a>
                </div>
            </aside>

            <main class="content">
                <section class="dashboard-section">
                    <h3 class="section-heading">DEFINE NEW BUDGET</h3>
                    <hr class="thick-line">
                    <div class="explorer-container">
                        <form action="/add_budget" method="POST" style="display: flex; flex-direction: column; gap: 20px; max-width: 600px;">
                            
                            <div class="filter-group">
                                <label for="amount">BUDGET AMOUNT ($)</label>
                                <input type="number" step="0.01" name="amount" class="cv-input" required>
                            </div>

                            <div style="display: flex; gap: 20px;">
                                <div class="filter-group" style="flex: 1;">
                                    <label for="budget_month">MONTH (1-12)</label>
                                    <input type="number" min="1" max="12" name="budget_month" class="cv-input" required>
                                </div>
                                <div class="filter-group" style="flex: 1;">
                                    <label for="budget_year">YEAR</label>
                                    <input type="number" min="2020" max="2050" name="budget_year" class="cv-input" required>
                                </div>
                            </div>

                            <div class="filter-group">
                                <label for="category_id">CATEGORY</label>
                                <select name="category_id" class="cv-input" required>
                                    <option value="1">Groceries</option>
                                    <option value="3">Rent</option>
                                </select>
                            </div>

                            <div class="filter-group">
                                <label for="scope">SCOPE</label>
                                <select name="scope" class="cv-input" required>
                                    <option value="individual">INDIVIDUAL</option>
                                    <option value="household">HOUSEHOLD</option>
                                </select>
                            </div>

                            <button type="submit" class="cv-submit" style="margin-top: 15px; width: fit-content;">DEFINE BUDGET</button>
                        </form>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
